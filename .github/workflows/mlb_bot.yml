name: MLB Bot Daily

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # UTC 06:00 = TW 14:00（每天下午兩點自動更新）

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy

      - name: Run MLB Bot
        env:
          ODDS_API_KEY:              ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK:           ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN:                  ${{ secrets.GH_TOKEN }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python mlb_bot_v101.py

      - name: Commit and push picks_latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/picks_latest.json docs/odds_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update picks_latest.json [skip ci]"
            git pull --rebase -X ours origin HEAD || true
            git push origin HEAD
          fi
