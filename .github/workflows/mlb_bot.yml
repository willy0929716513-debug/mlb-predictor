name: MLB Bot Daily

on:
  workflow_dispatch:
  schedule:
    # 每天台灣時間 09:00（UTC 01:00）→ 賽前分析
    # 每天台灣時間 11:00（UTC 03:00）→ 賽前補跑 / 場中補捉早場
    # 每天台灣時間 23:00（UTC 15:00）→ 下午場進行中
    # 每天台灣時間 01:00（UTC 17:00）→ 傍晚場進行中
    # 每天台灣時間 03:00（UTC 19:00）→ 晚間場進行中
    # 每天台灣時間 06:00（UTC 22:00）→ 深夜場 / 西岸晚間場
    - cron: '0 1 * * *'
    - cron: '0 3 * * *'
    - cron: '0 15 * * *'
    - cron: '0 17 * * *'
    - cron: '0 19 * * *'
    - cron: '0 22 * * *'

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests numpy

      - name: Run MLB Bot
        env:
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
        run: python mlb_bot_v101.py

      - name: Commit and push picks_latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/picks_latest.json docs/odds_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update picks_latest.json [skip ci]"
            git push origin HEAD
          fi
