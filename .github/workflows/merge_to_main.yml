name: Merge Feature to Main

on:
  push:
    branches:
      - 'claude/model-overview-w7p4ya'
    paths:
      - 'mlb_bot_v101.py'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Merge feature branch into main
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git fetch origin claude/model-overview-w7p4ya
          git merge --ff-only origin/claude/model-overview-w7p4ya \
            || git merge --no-ff origin/claude/model-overview-w7p4ya \
               -m "chore: merge comprehensive model overhaul to main"
          git push origin main
          echo "Merged successfully to main"
