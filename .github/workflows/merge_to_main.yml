name: Merge Feature to Main

on:
  push:
    branches:
      - 'claude/model-overview-w7p4ya'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Deploy feature file to main
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git fetch origin claude/model-overview-w7p4ya
          git checkout origin/claude/model-overview-w7p4ya -- mlb_bot_v101.py
          git commit -m "chore: deploy comprehensive model overhaul to main (FIP fix, calibration, ML/UNDER protections)"
          git push origin main
          echo "Deployed successfully to main"
