name: Merge Feature to Main

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Branch to merge into main'
        required: true
        default: 'claude/model-overview-w7p4ya'

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Merge feature branch
        run: |
          git config user.email "noreply@anthropic.com"
          git config user.name "Claude"
          git fetch origin ${{ github.event.inputs.source_branch }}
          git merge --no-ff origin/${{ github.event.inputs.source_branch }} \
            -m "chore: merge model overhaul (FIP fix, calibration, ML/UNDER protections)"
          git push origin main
