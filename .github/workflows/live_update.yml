name: MLB Live Update

on:
  workflow_dispatch:
  schedule:
    # 比賽時段每 5 分鐘（UTC 17:30–03:30 = TW 01:30–11:30，前後各縮30分鐘）
    - cron: '30/5 17 * * *'    # UTC 17:30–17:55
    - cron: '*/5 18-23 * * *'  # UTC 18:00–23:55
    - cron: '*/5 0-2 * * *'    # UTC 00:00–02:55
    - cron: '0-30/5 3 * * *'   # UTC 03:00–03:30

permissions:
  contents: write

jobs:
  live-update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run live updater
        run: python live_update.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/picks_latest.json
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: live score update [skip ci]"
            git pull --rebase -X ours origin HEAD || true
            git push origin HEAD
          fi
