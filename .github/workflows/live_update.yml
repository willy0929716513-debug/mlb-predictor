name: MLB Live Update

on:
  workflow_dispatch:
  schedule:
    # 兩個入口觸發（各負責半段比賽時間，每段最多跑 6 小時）
    - cron: '30 17 * * *'   # UTC 17:30 = TW 01:30（下午/傍晚場入口）
    - cron: '30 22 * * *'   # UTC 22:30 = TW 06:30（晚間/深夜場入口）
    - cron: '30 23 * * *'   # UTC 23:30 = TW 07:30（深夜場補充入口）

permissions:
  contents: write

jobs:
  live-update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_NO_WARNINGS: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Live update loop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MISS=0       # 連續無比賽次數
          SEEN=0       # 是否曾偵測到比賽

          python3 -c "
import os, requests
topic = os.environ.get('NTFY_TOPIC', 'mlb-picks-willy0815')
requests.post('https://ntfy.sh', json={'topic': topic, 'title': '⚾ 場中更新啟動', 'message': '開始監控比賽中...', 'priority': 4, 'tags': ['baseball']}, timeout=10)
" 2>/dev/null || true

          while [ $MISS -lt 3 ]; do
            python live_update.py

            COUNT=$(python -c "
          import json, sys
          try:
            d = json.load(open('docs/picks_latest.json', encoding='utf-8'))
            print(len(d.get('live_games', [])))
          except:
            print(0)
          ")

            if [ "$COUNT" -gt 0 ]; then
              echo "偵測到 $COUNT 場比賽進行中"
              MISS=0
              SEEN=1
              git add docs/picks_latest.json
              if ! git diff --cached --quiet; then
                git commit -m "chore: live score update [skip ci]"
                git pull --rebase -X ours origin HEAD || true
                git push origin HEAD
              fi
              sleep 300
            else
              MISS=$((MISS + 1))
              if [ $SEEN -eq 0 ]; then
                echo "尚未偵測到比賽，等待中... (miss $MISS)"
                sleep 600
              else
                echo "比賽已結束？連續 $MISS/3 次無比賽"
                sleep 300
              fi
            fi
          done

          echo "連續 3 次無場中比賽，workflow 自動結束。"
