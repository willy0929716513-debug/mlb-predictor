<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MLB 每日推薦</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MLB推薦"/>
  <link rel="apple-touch-icon" href="icon.svg"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:'Segoe UI',system-ui,sans-serif; }

    .card { background:#1e293b; border:1px solid #334155; }
    .tier-diamond { border-left:4px solid #a78bfa; }
    .tier-fire    { border-left:4px solid #f97316; }
    .tier-star    { border-left:4px solid #38bdf8; }

    .badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:9999px; font-size:0.70rem; font-weight:700; letter-spacing:.02em; }
    .badge-ml  { background:#1e3a8a; color:#93c5fd; }
    .badge-rl  { background:#4c1d95; color:#c4b5fd; }
    .badge-tot { background:#064e3b; color:#6ee7b7; }

    .stat-box { background:#0f172a; border-radius:0.5rem; padding:0.5rem 0.75rem; }
    .type-pill { background:#1e293b; border:1px solid #334155; border-radius:0.5rem; padding:0.4rem 0.6rem; }

    .sp-chip { display:inline-flex; align-items:center; gap:3px;
               background:#0f172a; border:1px solid #334155;
               border-radius:6px; padding:2px 7px; font-size:0.68rem; }
    .sp-warn { border-color:#f97316; color:#fb923c; }

    /* Lineup table */
    .lineup-row { display:grid; grid-template-columns:1.2rem 2.2rem 1fr; gap:4px;
                  align-items:center; padding:2px 0; font-size:0.68rem; }
    .lineup-order { color:#64748b; font-weight:700; text-align:right; }
    .lineup-pos   { color:#94a3b8; background:#0f172a; border-radius:3px;
                    padding:0 3px; text-align:center; font-weight:600; font-size:0.62rem; }
    .lineup-name  { color:#e2e8f0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Filter tabs */
    .tab { padding:6px 16px; border-radius:8px; font-size:0.78rem; font-weight:600;
           cursor:pointer; transition:all .15s; border:1px solid transparent; }
    .tab-active { background:#38bdf8; color:#0f172a; }
    .tab-inactive { background:#1e293b; color:#94a3b8; border-color:#334155; }
    .tab-inactive:hover { background:#263548; color:#e2e8f0; }

    /* Pick card expand */
    .detail-section { overflow:hidden; transition:max-height .3s ease, opacity .3s ease; }
    .detail-section.collapsed { max-height:0; opacity:0; }
    .detail-section.expanded  { max-height:1000px; opacity:1; }

    /* Card fade-in */
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .pick-card { animation: fadeUp .25s ease both; }

    /* Copy toast */
    #copy-toast { transition: opacity .25s ease; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation: spin .7s linear; }

    /* Token modal */
    #token-modal { backdrop-filter:blur(4px); }
    #history-panel { overflow:hidden; transition:max-height .35s ease, opacity .3s ease; }
    #history-panel.closed { max-height:0; opacity:0; }
    #history-panel.open   { max-height:2000px; opacity:1; }

    /* ── 淺色主題 ── */
    body.light { background:#f1f5f9; color:#1e293b; }
    body.light .card { background:#ffffff; border-color:#e2e8f0; }
    body.light .stat-box { background:#f8fafc; }
    body.light .type-pill { background:#f8fafc; border-color:#e2e8f0; }
    body.light .tab-inactive { background:#f1f5f9; color:#64748b; border-color:#cbd5e1; }
    body.light .sp-chip { background:#f1f5f9; border-color:#e2e8f0; color:#475569; }
    body.light .badge-ml { background:#dbeafe; color:#1d4ed8; }
    body.light .badge-rl { background:#ede9fe; color:#7c3aed; }
    body.light .badge-tot { background:#d1fae5; color:#065f46; }
    body.light .text-white { color:#0f172a !important; }
    body.light .text-slate-200 { color:#1e293b !important; }
    body.light .text-slate-300 { color:#334155 !important; }
    body.light .text-slate-400 { color:#475569 !important; }
    body.light .text-slate-500 { color:#64748b !important; }
    body.light .text-slate-600 { color:#94a3b8 !important; }
    body.light .text-slate-700 { color:#cbd5e1 !important; }
    body.light .bg-slate-700 { background:#e2e8f0 !important; }
    body.light .bg-slate-800\/60 { background:rgba(226,232,240,0.7) !important; }
    body.light .bg-slate-800\/40 { background:rgba(226,232,240,0.5) !important; }
    body.light .bg-slate-800\/50 { background:rgba(226,232,240,0.6) !important; }
    body.light .border-slate-700\/40 { border-color:rgba(148,163,184,0.4) !important; }
    body.light #picks-container .card, body.light #live-section .card { color:#1e293b; }

    /* ── W/L 近況條 ── */
    .form-sq { display:inline-flex; align-items:center; justify-content:center;
               width:1.2rem; height:1.2rem; border-radius:3px;
               font-size:0.6rem; font-weight:800; line-height:1; }
    .form-w  { background:#059669; color:#fff; }
    .form-l  { background:#e11d48; color:#fff; }
    .form-p  { background:#475569; color:#fff; }
    .form-pd { background:rgba(234,179,8,0.25); color:#ca8a04; border:1px solid rgba(234,179,8,0.3); }

    /* ── 勝率機率條 ── */
    .prob-track { position:relative; height:6px; background:#1e293b; border-radius:9999px; overflow:hidden; }
    body.light .prob-track { background:#e2e8f0; }

    /* ── 置頂按鈕 ── */
    .pin-btn { background:none; border:none; cursor:pointer; line-height:1;
               padding:2px 4px; border-radius:4px; transition:all .15s; font-size:0.85rem; }
    .pin-btn:hover  { background:rgba(251,191,36,0.15); }
    .pin-btn.pinned { filter:none; }
    .pin-btn.unpinned { opacity:0.3; filter:grayscale(1); }
    .pin-btn.unpinned:hover { opacity:0.7; filter:none; }
    .card-pinned { border-color:#d97706 !important; box-shadow:0 0 0 1px rgba(217,119,6,0.25); }

    /* ── Skeleton loading ── */
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skeleton { background:linear-gradient(90deg,#1e293b 25%,#263548 50%,#1e293b 75%);
                background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:0.5rem; }
    body.light .skeleton { background:linear-gradient(90deg,#e2e8f0 25%,#f1f5f9 50%,#e2e8f0 75%);
                           background-size:200% 100%; }

    /* ── Sticky filter tabs ── */
    #filter-tabs { position:sticky; top:0; z-index:20;
                   background:rgba(15,23,42,0.95); backdrop-filter:blur(8px);
                   margin-left:-1rem; margin-right:-1rem; padding:0.5rem 1rem;
                   border-bottom:1px solid rgba(51,65,85,0.5); }
    body.light #filter-tabs { background:rgba(241,245,249,0.95); border-bottom-color:rgba(203,213,225,0.5); }

    /* ── Spotlight card ── */
    .spotlight-card { background:linear-gradient(135deg,#1e293b 0%,#1a2942 100%);
                      border:1px solid rgba(251,191,36,0.3); position:relative; overflow:hidden; }
    .spotlight-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px;
                               background:linear-gradient(90deg,#f59e0b,#fcd34d,#f59e0b); }
    body.light .spotlight-card { background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 100%);
                                  border-color:rgba(217,119,6,0.5); }
    body.light .spotlight-card .text-white { color:#1c1917 !important; }
    body.light .spotlight-card .text-slate-300 { color:#44403c !important; }
    body.light .spotlight-card .text-slate-500 { color:#78716c !important; }

    /* ── SP card in expanded section ── */
    .sp-grade { display:inline-flex; align-items:center; justify-content:center;
                width:2.2rem; height:2.2rem; border-radius:50%; font-size:0.7rem; font-weight:900; }
    .sp-grade-a { background:rgba(52,211,153,0.15); color:#34d399; border:1.5px solid rgba(52,211,153,0.4); }
    .sp-grade-b { background:rgba(251,191,36,0.15); color:#fbbf24; border:1.5px solid rgba(251,191,36,0.4); }
    .sp-grade-c { background:rgba(244,63,94,0.15); color:#f43f5e; border:1.5px solid rgba(244,63,94,0.4); }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">

<!-- Token modal -->
<div id="token-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70"
     onclick="if(event.target===this)closeTokenModal()">
  <div class="bg-slate-800 border border-slate-600 rounded-2xl p-5 mx-4 w-full max-w-sm shadow-2xl">
    <h3 class="text-white font-bold text-base mb-1">🔑 輸入 GitHub Token</h3>
    <p class="text-slate-400 text-xs mb-3">
      需要有 <code class="bg-slate-700 px-1 rounded">workflow</code> 權限的 Personal Access Token（Fine-grained 或 Classic）。
      只會存在瀏覽器 localStorage，不會傳送到其他地方。
    </p>
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxx"
           class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white
                  placeholder:text-slate-600 focus:outline-none focus:border-sky-500 mb-3"/>
    <div class="flex gap-2">
      <button onclick="saveToken()"
              class="flex-1 bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold py-2 rounded-lg transition-colors">
        儲存並執行
      </button>
      <button onclick="closeTokenModal()"
              class="px-4 bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm rounded-lg transition-colors">
        取消
      </button>
    </div>
    <button onclick="clearToken()"
            class="mt-2 w-full text-xs text-slate-600 hover:text-rose-400 transition-colors text-center">
      清除已儲存的 Token
    </button>
  </div>
</div>

<!-- Run toast -->
<div id="run-toast"
     class="fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0
            text-sm font-semibold px-4 py-2 rounded-full shadow-xl transition-opacity duration-300">
</div>

<!-- Copy toast -->
<div id="copy-toast"
     class="fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0
            bg-emerald-600 text-white text-sm font-semibold px-4 py-2 rounded-full shadow-xl">
  ✓ 已複製到剪貼簿
</div>

<div class="max-w-2xl mx-auto">

  <!-- ── Header ───────────────────────────────── -->
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 class="text-xl font-bold text-white">⚾ MLB V2 每日推薦</h1>
      <p id="gen-time" class="text-xs text-slate-500 mt-0.5"></p>
    </div>
    <div class="flex items-center gap-2">
      <button id="theme-btn" onclick="toggleTheme()"
              class="w-9 h-9 flex items-center justify-center bg-slate-800 hover:bg-slate-700
                     border border-slate-600 rounded-full text-slate-300 text-base transition-colors">🌙</button>
      <button id="notif-btn" onclick="requestNotifPermission()"
              class="relative w-9 h-9 flex items-center justify-center bg-slate-800 hover:bg-slate-700
                     border border-slate-600 rounded-full text-slate-300 text-base transition-colors">🔔</button>
      <span id="refresh-countdown" class="text-xs text-slate-600 tabular-nums"></span>
      <button onclick="manualRefresh()"
              class="w-9 h-9 flex items-center justify-center bg-slate-800 hover:bg-slate-700
                     border border-slate-600 rounded-full text-slate-300 text-base transition-colors">
        <span id="refresh-icon">↻</span>
      </button>
    </div>
  </div>

  <!-- ── Action bar ────────────────────────────── -->
  <div class="grid grid-cols-2 gap-2 mb-5">
    <button onclick="triggerBot()" id="run-btn"
            class="flex items-center justify-center gap-2 py-2.5 rounded-xl
                   bg-emerald-700 hover:bg-emerald-600 active:bg-emerald-800
                   text-white text-sm font-bold transition-colors">
      <span id="run-btn-icon" class="text-base">▶</span> 立即執行
    </button>
    <button onclick="toggleHistory()"
            class="flex items-center justify-center gap-2 py-2.5 rounded-xl
                   bg-slate-700 hover:bg-slate-600 border border-slate-600
                   text-slate-300 text-sm font-semibold transition-colors">
      📋 <span id="hist-btn-label">歷史紀錄</span>
    </button>
  </div>

  <!-- ── 整體統計 ──────────────────────────────── -->
  <div class="card rounded-xl p-4 mb-4">
    <div class="grid grid-cols-3 gap-3 mb-3">
      <div class="stat-box text-center flex flex-col items-center justify-center">
        <div id="s-wr" class="flex flex-col items-center">
          <div class="text-xl font-bold text-white">—</div>
          <div class="text-xs text-slate-500 mt-0.5">整體勝率</div>
        </div>
      </div>
      <div class="stat-box text-center flex flex-col items-center justify-center">
        <div class="text-xl font-bold" id="s-roi">—</div>
        <div class="text-xs text-slate-500 mt-0.5">ROI</div>
      </div>
      <div class="stat-box text-center flex flex-col items-center justify-center">
        <div class="text-xl font-bold text-white whitespace-nowrap" id="s-record">—</div>
        <div class="text-xs text-slate-500 mt-0.5">勝 / 場</div>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-2" id="by-type-row"></div>
    <div id="form-strip" class="mt-3 pt-2 border-t border-slate-700/40 flex items-center gap-1 flex-wrap min-h-[1.5rem]"></div>
    <div id="s-streak"></div>
    <div id="roi-chart" class="mt-2"></div>
    <div id="today-pnl" class="mt-1"></div>
  </div>

  <!-- ── History panel ───────────────────────────── -->
  <div id="history-panel" class="closed">
    <div class="card rounded-xl p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-bold text-white">📋 最近 10 場紀錄</h2>
        <span id="hist-summary" class="text-xs text-slate-500"></span>
      </div>
      <div id="hist-list" class="space-y-2"></div>
    </div>
  </div>

  <!-- ── Spotlight (today's best pick) ────────── -->
  <div id="spotlight"></div>

  <!-- ── Filter tabs ───────────────────────────── -->
  <div class="flex gap-2 mb-1 flex-wrap" id="filter-tabs">
    <button class="tab tab-active" data-filter="ALL" onclick="setFilter('ALL',this)">全部 <span id="cnt-ALL" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive" data-filter="獨贏" onclick="setFilter('獨贏',this)">ML 獨贏 <span id="cnt-ML" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive" data-filter="讓分" onclick="setFilter('讓分',this)">RL 讓分 <span id="cnt-RL" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive" data-filter="大小分" onclick="setFilter('大小分',this)">TOT 大小分 <span id="cnt-TOT" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive relative" data-filter="場中" onclick="setFilter('場中',this)">⚾ 場中 <span id="cnt-LIVE" class="ml-1 opacity-70"></span><span id="live-dot" class="hidden absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span></button>
  </div>

  <!-- ── Live game section (hidden until 場中 tab active) ── -->
  <div id="live-section" style="display:none"></div>
  <div id="live-auto-label" class="text-center text-xs text-slate-700 mt-2 pb-1" style="display:none"></div>

  <!-- ── Pick cards ────────────────────────────── -->
  <div id="picks-container">
    <div class="space-y-4">
      <div class="card rounded-xl p-4"><div class="skeleton h-3 w-1/2 mb-3"></div><div class="skeleton h-5 w-3/4 mb-3"></div><div class="skeleton h-10 w-full mb-3 rounded-lg"></div><div class="grid grid-cols-3 gap-2"><div class="skeleton h-12 rounded-lg"></div><div class="skeleton h-12 rounded-lg"></div><div class="skeleton h-12 rounded-lg"></div></div></div>
      <div class="card rounded-xl p-4"><div class="skeleton h-3 w-2/3 mb-3"></div><div class="skeleton h-5 w-4/5 mb-3"></div><div class="skeleton h-10 w-full mb-3 rounded-lg"></div><div class="grid grid-cols-3 gap-2"><div class="skeleton h-12 rounded-lg"></div><div class="skeleton h-12 rounded-lg"></div><div class="skeleton h-12 rounded-lg"></div></div></div>
    </div>
  </div>

  <p class="text-center text-xs text-slate-700 mt-6">
    Poisson · FIP+ERA混合 · K/9 · WHIP · 休息天數 · 球場PF · Devig · Kelly · 僅供參考
  </p>
</div>

<script>
const JSON_URL = "picks_latest.json";
let allPicks = [];
let currentFilter = "ALL";
let historyOpen = false;
let recentHistory = [];
let _lastLiveGames = [];
let _pinnedGames = new Set(JSON.parse(localStorage.getItem("mlb_pinned") || "[]"));

/* ── Team key mapping ────────────────────────── */
const CN_TO_KEY = {
  "運動家":"athletics","太空人":"astros","藍鳥":"blue jays","勇士":"braves",
  "釀酒人":"brewers","紅雀":"cardinals","小熊":"cubs","響尾蛇":"diamondbacks",
  "道奇":"dodgers","巨人":"giants","守護者":"guardians","水手":"mariners",
  "馬林魚":"marlins","大都會":"mets","國民":"nationals","金鶯":"orioles",
  "教士":"padres","費城人":"phillies","海盜":"pirates","遊騎兵":"rangers",
  "光芒":"rays","紅襪":"red sox","紅人":"reds","落磯":"rockies",
  "皇家":"royals","老虎":"tigers","雙城":"twins","白襪":"white sox",
  "洋基":"yankees","天使":"angels",
};

/* ── Pin / unpin live game ───────────────────── */
function togglePin(key){
  if(_pinnedGames.has(key)) _pinnedGames.delete(key);
  else _pinnedGames.add(key);
  localStorage.setItem("mlb_pinned", JSON.stringify([..._pinnedGames]));
  renderLiveSection(_lastLiveGames);
  // 重設 live-ts-label（renderLiveSection 會清空 innerHTML）
  const tsEl = document.getElementById("live-ts-label");
  if(tsEl && _lastLiveGames._ts_label) tsEl.textContent = _lastLiveGames._ts_label;
}

/* ── Live game card renderer ─────────────────── */
function renderLiveSection(liveGames) {
  const el   = document.getElementById("live-section");
  const dot  = document.getElementById("live-dot");
  const cnt  = document.getElementById("cnt-LIVE");
  if (!el) return;

  const count = (liveGames || []).length;
  if (cnt)  cnt.textContent  = count > 0 ? `(${count})` : "";
  if (dot)  dot.classList.toggle("hidden", count === 0);

  if (count === 0) {
    el.innerHTML = `
      <div class="card rounded-xl p-6 text-center">
        <div class="text-2xl mb-2">⚾</div>
        <div class="text-sm text-slate-400">目前沒有場中推薦</div>
        <div class="text-xs text-slate-600 mt-1">比賽開始後重新執行 Bot 即可更新</div>
      </div>`;
    return;
  }

  _lastLiveGames = liveGames || [];
  const half = g => g.top_inning ? "▲" : "▼";

  // 置頂的排前面，其餘維持原順序
  const sorted = [...(liveGames || [])].sort((a, b) => {
    const pa = _pinnedGames.has(`${a.away_cn}@${a.home_cn}`) ? 0 : 1;
    const pb = _pinnedGames.has(`${b.away_cn}@${b.home_cn}`) ? 0 : 1;
    return pa - pb;
  });

  const cards = sorted.map(g => {
    const gameKey  = `${g.away_cn}@${g.home_cn}`;
    const isPinned = _pinnedGames.has(gameKey);
    const projDiff = g.projected_total - g.market_total;
    const projCol  = Math.abs(projDiff) < 1 ? "text-slate-400"
                   : projDiff < 0 ? "text-sky-400" : "text-orange-400";
    const projArrow = projDiff >= 1 ? "↑" : projDiff <= -1 ? "↓" : "≈";

    const betHtml = g.bet
      ? `<div class="mt-3 rounded-lg bg-emerald-900/50 border border-emerald-600/40 px-4 py-3">
           <div class="flex items-start gap-2">
             <span class="text-emerald-400 mt-0.5">📡</span>
             <div>
               <div class="text-sm font-bold text-emerald-300">${g.bet}</div>
               <div class="text-xs text-slate-400 mt-1 leading-relaxed">${g.reason||""}</div>
             </div>
           </div>
         </div>`
      : `<div class="mt-3 rounded bg-slate-800/40 px-3 py-2 text-center">
           <span class="text-xs text-slate-600">持續觀察中，暫無推薦</span>
         </div>`;

    return `
    <div class="card rounded-xl p-4 mb-3 border ${isPinned ? 'card-pinned' : 'border-slate-700/40'}">
      <!-- 頂行：狀態 + 置頂 + 局數 -->
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2">
          <span class="flex items-center gap-1.5 text-xs font-bold text-red-400 tracking-wide">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse inline-block"></span>
            LIVE
          </span>
          ${isPinned ? '<span class="text-[0.6rem] font-bold text-amber-400 bg-amber-400/10 px-1.5 py-0.5 rounded">📌 置頂</span>' : ''}
        </div>
        <div class="flex items-center gap-1.5">
          <button onclick="togglePin('${gameKey}')"
                  class="pin-btn ${isPinned ? 'pinned' : 'unpinned'}"
                  title="${isPinned ? '取消置頂' : '置頂此比賽'}">📌</button>

/* ── helpers ─────────────────────────────────── */
function tierClass(tier){
  if(tier.includes("💎")) return "tier-diamond";
  if(tier.includes("🔥")) return "tier-fire";
  return "tier-star";
}

function btypeKey(btype){
  if(btype==="獨贏") return "badge-ml";
  if(btype==="讓分") return "badge-rl";
  if(btype==="大小分") return "badge-tot";
  return "";
}

function btypeBadge(btype){
  const cls = btypeKey(btype);
  const label = btype==="獨贏"?"ML 獨贏":btype==="讓分"?"RL 讓分":btype==="大小分"?"TOT 大小分":btype;
  return `<span class="badge ${cls}">${label}</span>`;
}

function pnlColor(v){ return v==null?"text-slate-400":v>=0?"text-emerald-400":"text-rose-400"; }
function signStr(v,dec=1){ return (v>=0?"+":"")+v.toFixed(dec); }

/* Convert decimal odds to American odds string */
function toAmerican(dec){
  if(!dec||dec<=1) return "—";
  if(dec>=2) return "+" + Math.round((dec-1)*100);
  return String(Math.round(-100/(dec-1)));
}

/* ── L10 win-rate chip ───────────────────────── */
function l10Chip(wpct, label){
  if(wpct==null) return "";
  const wins = Math.round(wpct * 10);
  const losses = 10 - wins;
  const col = wpct >= 0.70 ? "text-emerald-400" :
              wpct >= 0.60 ? "text-emerald-300" :
              wpct <= 0.30 ? "text-rose-400"    :
              wpct <= 0.40 ? "text-rose-300"    : "text-slate-400";
  return `<span class="${col} text-xs" title="${label}近10場 ${wins}勝${losses}負">${label}L10 ${wins}-${losses}</span>`;
}

/* ── Lineup column renderer ──────────────────── */
function lineupCol(lineup, label){
  if(!lineup || lineup.length === 0)
    return `<div><div class="text-xs text-slate-600 mb-1 font-medium">${label}打線</div><div class="text-xs text-slate-700">打線未公告</div></div>`;
  const rows = lineup.map(b =>
    `<div class="lineup-row">
       <div class="lineup-order">${b.order}</div>
       <div class="lineup-pos">${b.pos||"—"}</div>
       <div class="lineup-name">${b.name}</div>
     </div>`
  ).join("");
  return `<div>
    <div class="text-xs text-slate-500 font-medium mb-1">${label}打線</div>
    ${rows}
  </div>`;
}

/* ── Pitcher trend chip ──────────────────────── */
function trendChip(t){
  if(t==null) return "";
  if(t > 1.5) return `<span class="sp-chip text-rose-400">📈 ERA+${t.toFixed(1)} 惡化</span>`;
  if(t > 0.5) return `<span class="sp-chip text-amber-400">↑ ERA+${t.toFixed(1)}</span>`;
  if(t <-1.5) return `<span class="sp-chip text-emerald-400">📉 ERA${t.toFixed(1)} 改善</span>`;
  if(t <-0.5) return `<span class="sp-chip text-emerald-300">↓ ERA${t.toFixed(1)}</span>`;
  return "";
}

/* ── Adjust displayed game time -1 min ────────── */
function adjustGameTime(timeStr){
  if(!timeStr) return timeStr;
  const m = timeStr.match(/(\d{1,2}):(\d{2})/);
  if(!m) return timeStr;
  let h = parseInt(m[1]), min = parseInt(m[2]) - 1;
  if(min < 0){ min = 59; h = (h - 1 + 24) % 24; }
  return `${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`;
}

/* ── Game countdown ───────────────────────────── */
function gameCountdown(dateStr, timeStr){
  if(!dateStr||!timeStr) return "";
  const m = timeStr.match(/(\d{1,2}):(\d{2})/);
  if(!m) return "";
  const hh=parseInt(m[1]), mm=parseInt(m[2]);
  const [mo,dd] = dateStr.split('/').map(Number);
  // compute diff in TW timezone (UTC+8)
  const nowUtcMs = Date.now();
  const twNow = new Date(nowUtcMs + 8*3600000);
  const gameMs = Date.UTC(twNow.getUTCFullYear(), mo-1, dd, hh, mm);
  const nowMs  = twNow.getTime();
  const diff   = gameMs - nowMs;
  if(diff<=0||diff>8*3600000) return ""; // 8 小時內才顯示倒數
  const h=Math.floor(diff/3600000), min=Math.floor((diff%3600000)/60000);
  if(h>0) return `${h}h${min}m 後開賽`;
  if(min>1) return `${min} 分後開賽`;
  return "即將開賽"; // 開賽前 1 分鐘內才顯示「即將開賽」
}

/* ── Streak counter ───────────────────────────── */
function renderStreak(hist){
  const el = document.getElementById("s-streak");
  if(!el) return;
  const settled = (hist||[]).filter(r=>r.result==="W"||r.result==="L");
  if(settled.length<2){ el.innerHTML=''; return; }
  const last = settled[settled.length-1].result;
  let streak=1;
  for(let i=settled.length-2;i>=0;i--){
    if(settled[i].result===last) streak++; else break;
  }
  if(streak<2){ el.innerHTML=''; return; }
  el.innerHTML = last==="W"
    ? `<div class="text-xs text-amber-400 mt-1 text-center">🔥 連贏 ${streak} 場</div>`
    : `<div class="text-xs text-rose-400 mt-1 text-center">❄️ 連輸 ${streak} 場</div>`;
}

/* ── SP chip builder ─────────────────────────── */
function spChips(name, era, fip, k9, avgip, rest, whip, hand, babip, lob){
  if(!name||name==="TBD") return '<span class="text-slate-600">TBD</span>';
  // 慣用手標籤
  const handBadge = hand==="L"
    ? `<span class="sp-chip text-indigo-300 font-bold">左</span> `
    : hand==="R" ? `<span class="sp-chip text-slate-400">右</span> ` : "";
  let chips = handBadge + `<span class="font-medium text-slate-200">${name}</span>`;
  if(era!=null){
    const col = era<=3.5?"text-emerald-400":era>=4.8?"text-rose-400":"text-slate-300";
    let eraLabel = `ERA ${era.toFixed(2)}`;
    if(fip!=null && Math.abs(fip-era)>=0.50){
      const fipCol = fip<era?"text-emerald-300":"text-amber-300";
      eraLabel += ` <span class="${fipCol}">FIP ${fip.toFixed(2)}</span>`;
    }
    chips += ` <span class="sp-chip ${col}">${eraLabel}</span>`;
  }
  // BABIP 運氣指標（>0.330 幸運低ERA；<0.270 倒楣高ERA）
  if(babip!=null){
    if(babip>0.330) chips+=` <span class="sp-chip text-amber-400" title="BABIP偏高，ERA可能偏低（運氣）">BABIP ${babip.toFixed(3)} ⚠️</span>`;
    else if(babip<0.270) chips+=` <span class="sp-chip text-rose-400" title="BABIP偏低，ERA可能偏高（倒楣）">BABIP ${babip.toFixed(3)} ↑</span>`;
  }
  // LOB% 異常提示（<65% 留底率差；>80% 幸運逃脫跑者）
  if(lob!=null){
    if(lob<65) chips+=` <span class="sp-chip text-rose-400" title="殘壘率偏低，跑者得分效率差">LOB ${lob.toFixed(0)}%↓</span>`;
    else if(lob>80) chips+=` <span class="sp-chip text-amber-400" title="殘壘率偏高，運氣成分高">LOB ${lob.toFixed(0)}%↑</span>`;
  }
  if(k9!=null && k9>=8.5)
    chips += ` <span class="sp-chip text-sky-400">K/9 ${k9.toFixed(1)}</span>`;
  if(avgip!=null){
    const warn = avgip<5.0;
    chips += ` <span class="sp-chip ${warn?'sp-warn':''}">${avgip.toFixed(1)} IP/G${warn?' ⚠️':''}</span>`;
  }
  if(whip!=null && whip>=1.30)
    chips += ` <span class="sp-chip text-amber-400">WHIP ${whip.toFixed(2)}</span>`;
  if(rest!=null){
    if(rest<=3)  chips += ` <span class="sp-chip sp-warn">短休 ${rest}d ⚠️</span>`;
    else if(rest>=9) chips += ` <span class="sp-chip sp-warn">長休 ${rest}d ⚠️</span>`;
  }
  return chips;
}

/* ── Copy to clipboard ───────────────────────── */
function copyBet(text){
  navigator.clipboard.writeText(text).then(()=>{
    const t = document.getElementById("copy-toast");
    t.style.opacity="1";
    setTimeout(()=>{ t.style.opacity="0"; }, 1800);
  }).catch(()=>{
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    const t = document.getElementById("copy-toast");
    t.style.opacity="1";
    setTimeout(()=>{ t.style.opacity="0"; }, 1800);
  });
}

/* ── Type pill renderer ──────────────────────── */
function renderTypePill(label, data){
  if(!data) return `<div class="type-pill text-center">
    <div class="text-xs font-bold text-slate-400">${label}</div>
    <div class="text-xs text-slate-600 mt-0.5">資料不足</div>
  </div>`;
  const wrCol  = data.win_rate>=55?"text-emerald-400":data.win_rate>=50?"text-amber-400":"text-rose-400";
  const roiCol = data.roi!=null?(data.roi>=0?"text-emerald-400":"text-rose-400"):"text-slate-500";
  return `<div class="type-pill text-center">
    <div class="text-xs font-bold text-slate-300 mb-1">${label}</div>
    <div class="text-sm font-bold ${wrCol}">${data.win_rate.toFixed(1)}%</div>
    <div class="text-xs text-slate-500">${data.wins}/${data.settled}</div>
    <div class="text-xs font-semibold ${roiCol} mt-0.5">ROI ${data.roi!=null?signStr(data.roi)+"%":"N/A"}</div>
  </div>`;
}

/* ── Filter ──────────────────────────────────── */
function setFilter(type, btn){
  currentFilter = type;
  sessionStorage.setItem("mlb_filter", type);
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("tab-active", t===btn);
    t.classList.toggle("tab-inactive", t!==btn);
  });
  const liveEl  = document.getElementById("live-section");
  const lblEl   = document.getElementById("live-auto-label");
  const picksEl = document.getElementById("picks-container");
  if (type === "場中") {
    liveEl.style.display  = "block";
    lblEl.style.display   = "block";
    picksEl.style.display = "none";
  } else {
    liveEl.style.display  = "none";
    lblEl.style.display   = "none";
    picksEl.style.display = "";
    renderPicks();
  }
  // iOS Safari 相容的滾到頂端
  document.documentElement.scrollTop = 0;
  document.body.scrollTop = 0;
  window.scrollTo(0, 0);
}

function renderPicks(){
  cardIdx = 0;
  const container = document.getElementById("picks-container");

/* ── Run bot ─────────────────────────────────── */
const GH_OWNER    = "willy0929716513-debug";
const GH_REPO     = "mlb-predictor";
const GH_WORKFLOW = "mlb_bot.yml";
const GH_BRANCH   = "main";

function showRunToast(msg, ok){
  const t = document.getElementById("run-toast");
  t.textContent = msg;
  t.className = "fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0 text-sm font-semibold px-4 py-2 rounded-full shadow-xl transition-opacity duration-300 "
    + (ok ? "bg-emerald-600 text-white" : "bg-rose-600 text-white");
  t.style.opacity = "1";
  setTimeout(()=>{ t.style.opacity="0"; }, 3000);
}

function openTokenModal(){
  const m = document.getElementById("token-modal");
  m.classList.remove("hidden");
  m.classList.add("flex");
  const saved = localStorage.getItem("gh_pat");
  document.getElementById("token-input").value = saved || "";
  setTimeout(()=>document.getElementById("token-input").focus(), 50);
}
function closeTokenModal(){
  const m = document.getElementById("token-modal");
  m.classList.add("hidden");
  m.classList.remove("flex");
}
function saveToken(){
  const v = document.getElementById("token-input").value.trim();
  if(!v){ showRunToast("請輸入 Token", false); return; }
  localStorage.setItem("gh_pat", v);
  closeTokenModal();
  dispatchWorkflow(v);
}
function clearToken(){
  localStorage.removeItem("gh_pat");
  document.getElementById("token-input").value = "";
  showRunToast("Token 已清除", true);
}

async function dispatchWorkflow(token){
  const btn  = document.getElementById("run-btn");
  const icon = document.getElementById("run-btn-icon");
  btn.disabled = true;
  icon.textContent = "…";

  try {
    const res = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/${GH_WORKFLOW}/dispatches`,
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Accept": "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: GH_BRANCH }),
      }
    );
    if(res.status === 204){
      showRunToast("✓ 已觸發！約 30 秒後更新", true);
      icon.textContent = "✓";
      setTimeout(()=>{ icon.textContent="▶"; btn.disabled=false; }, 5000);
    } else {
      const err = await res.json().catch(()=>({}));
      if(res.status===401||res.status===403){
        showRunToast("Token 無效或無 workflow 權限", false);
        openTokenModal();
      } else {
        showRunToast(`失敗 (${res.status}): ${err.message||""}`, false);
      }
      icon.textContent = "▶"; btn.disabled = false;
    }
  } catch(e){
    showRunToast("網路錯誤："+e.message, false);
    icon.textContent = "▶"; btn.disabled = false;
  }
}

function triggerBot(){
  const token = localStorage.getItem("gh_pat");
  if(token) dispatchWorkflow(token);
  else openTokenModal();
}

/* ── 場中自動輕量刷新 ──────────────────────────────────────
   每 5 分鐘 poll 一次（不管有沒有場中比賽），確保比賽開始後立即抓到。
   以 live_updated_ts + 5m30s 計算下次時刻；無 ts 時退回整 5 分鐘時鐘。
   倒數顯示只在有場中比賽時才顯示。                                    */

let _nextRefreshMs = 0;
let _hasLiveGames  = false;

function setNextRefreshFromTs(ts){
  const STALE_MS = 15 * 60 * 1000; // 超過 15 分鐘視為過期，不信任
  if (ts && (Date.now() - ts * 1000) < STALE_MS) {
    _nextRefreshMs = ts * 1000 + 5 * 60 * 1000 + 30 * 1000;
  } else if (_nextRefreshMs === 0 || Date.now() > _nextRefreshMs) {
    // 退回：同步到下一個整 5 分鐘時鐘點 + 30 秒緩衝
    const now = new Date();
    const secsToTick = 5 * 60 - ((now.getMinutes() % 5) * 60 + now.getSeconds());
    _nextRefreshMs = Date.now() + secsToTick * 1000 + 30 * 1000;
  }
}

async function refreshLiveOnly(){
  try {
    const res  = await fetch(JSON_URL + "?t=" + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    const liveGames2 = data.live_games || [];
    liveGames2._ts_label = "更新 " + (data.live_updated_at || data.generated_at || "");
    _hasLiveGames = liveGames2.length > 0;
    renderLiveSection(liveGames2);
    checkLiveNotification(liveGames2);
    const tsEl = document.getElementById("live-ts-label");
    if (tsEl) tsEl.textContent = liveGames2._ts_label;
    setNextRefreshFromTs(data.live_updated_ts);
  } catch(e){ /* 靜默失敗 */ }
}

setInterval(async ()=>{
  // 永遠檢查是否到時，不因無場中比賽而跳過 — 才能在比賽開始時即時抓到
  if (_nextRefreshMs > 0 && Date.now() >= _nextRefreshMs) {
    _nextRefreshMs = Date.now() + 5 * 60 * 1000; // 暫置避免重複觸發
    await refreshLiveOnly();
  }
  // 倒數顯示：只在有場中比賽時才顯示
  const secs = (_hasLiveGames && _nextRefreshMs > 0)
    ? Math.max(0, Math.round((_nextRefreshMs - Date.now()) / 1000))
    : 0;
  const m   = Math.floor(secs / 60);
  const s   = String(secs % 60).padStart(2, "0");
  const cd  = document.getElementById("refresh-countdown");
  if (cd) cd.textContent = (_hasLiveGames && secs > 0) ? `${m}:${s}` : "";
  const lb  = document.getElementById("live-auto-label");
  if (lb && lb.style.display !== "none")
    lb.textContent = _hasLiveGames
      ? (secs > 0 ? `↻ ${m}:${s} 後自動更新` : "↻ 即將更新...")
      : "";
}, 1000);

/* ── W/L Form strip ──────────────────────────── */
function renderFormStrip(hist){
  const el = document.getElementById("form-strip");
  if(!el) return;
  const settled = (hist||[]).filter(r => r.result==="W"||r.result==="L"||r.result==="P");
  if(!settled.length){ el.innerHTML = ''; return; }
  const recent = settled.slice(-10);
  const squares = recent.map(r => {
    if(r.result==="W") return `<span class="form-sq form-w">W</span>`;
    if(r.result==="L") return `<span class="form-sq form-l">L</span>`;
    return `<span class="form-sq form-p">P</span>`;
  }).join("");
  el.innerHTML = `<span class="text-[0.65rem] text-slate-600 mr-1.5 shrink-0">近況</span>${squares}`;
}

/* ── ROI Sparkline ───────────────────────────── */
function renderROISparkline(hist){
  const el = document.getElementById("roi-chart");
  if(!el) return;
  const settled = (hist||[]).filter(r => r.result==="W"||r.result==="L"||r.result==="P");
  if(settled.length < 2){ el.innerHTML = ''; return; }
  let cum = 0;
  const points = settled.map(r => {
    if(r.result==="W"&&r.stake&&r.price) cum += r.stake*(r.price-1);
    else if(r.result==="L"&&r.stake) cum -= r.stake;
    return cum;
  });
  const W = 200, H = 28;
  const minV = Math.min(0, ...points);
  const maxV = Math.max(0, ...points);
  const range = maxV - minV || 1;
  const toX = i => (i/(points.length-1))*W;
  const toY = v => H - ((v-minV)/range)*H;
  const pts = points.map((v,i) => `${toX(i).toFixed(1)},${toY(v).toFixed(1)}`).join(" ");
  const zeroY = toY(0).toFixed(1);
  const last = points[points.length-1];
  const col = last >= 0 ? "#34d399" : "#f43f5e";
  el.innerHTML = `
    <div class="flex items-center justify-between text-[0.65rem] text-slate-600 mb-0.5">
      <span>累積 P&L</span>
      <span class="${last>=0?'text-emerald-400':'text-rose-400'} font-semibold">${last>=0?'+':''}$${last.toFixed(1)}</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" class="w-full" style="height:28px;display:block">
      <line x1="0" y1="${zeroY}" x2="${W}" y2="${zeroY}" stroke="#334155" stroke-width="1"/>
      <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>`;
}

/* ── Today P&L ───────────────────────────────── */
function renderTodayPnL(hist){
  const el = document.getElementById("today-pnl");
  if(!el) return;
  const now = new Date();
  const mm = String(now.getMonth()+1).padStart(2,'0');
  const dd = String(now.getDate()).padStart(2,'0');
  const todayStr = `${mm}/${dd}`;
  const todayBets = (hist||[]).filter(r => (r.date||"").includes(todayStr));
  if(!todayBets.length){ el.innerHTML = ''; return; }
  let pnl = 0, settled = 0, pending = 0;
  todayBets.forEach(r => {
    if(r.result==="W"&&r.stake&&r.price){ pnl += r.stake*(r.price-1); settled++; }
    else if(r.result==="L"&&r.stake){ pnl -= r.stake; settled++; }
    else pending++;
  });
  if(!settled && !pending){ el.innerHTML = ''; return; }
  const col = pnl>=0 ? "text-emerald-400" : "text-rose-400";
  const pendStr = pending > 0 ? ` · <span class="text-amber-400">${pending}場待結算</span>` : "";
  el.innerHTML = `<div class="flex items-center justify-between text-[0.65rem] mt-0.5">
    <span class="text-slate-600">今日損益${pendStr}</span>
    <span class="font-bold ${col}">${pnl>=0?'+':''}$${pnl.toFixed(1)}</span>
  </div>`;
}

/* ── Theme toggle ───────────────────────────── */
function toggleTheme(){
  const isLight = document.body.classList.toggle("light");
  const btn = document.getElementById("theme-btn");
  if(btn) btn.textContent = isLight ? "☀️" : "🌙";
  localStorage.setItem("mlb_theme", isLight ? "light" : "dark");
}

/* ── Browser push notifications ─────────────── */
let _lastLiveBetCount = -1;

function requestNotifPermission(){
  if(!("Notification" in window)){ showRunToast("此瀏覽器不支援通知", false); return; }
  if(Notification.permission === "granted"){
    // 已有權限：直接發測試通知確認
    try {
      new Notification("⚾ 測試通知", { body: "通知功能正常！場中有新推薦時會自動提醒。", icon: "icon.svg" });
    } catch(e){}
    showRunToast("✓ 通知已開啟（已發測試）", true);
    return;
  }
  Notification.requestPermission().then(perm => {
    const btn = document.getElementById("notif-btn");
    if(perm==="granted"){
      if(btn) btn.style.opacity = "1";
      // 立即發測試通知確認
      try {
        new Notification("⚾ 測試通知", { body: "通知功能正常！場中有新推薦時會自動提醒。", icon: "icon.svg" });
      } catch(e){}
      showRunToast("✓ 通知已開啟（已發測試）", true);
    } else {
      if(btn) btn.style.opacity = "0.4";
      showRunToast("通知已被封鎖", false);
    }
  });
}

function checkLiveNotification(liveGames){
  if(typeof Notification === "undefined" || Notification.permission !== "granted") return;
  const bets = (liveGames||[]).filter(g => g.bet);
  if(_lastLiveBetCount >= 0 && bets.length > _lastLiveBetCount){
    bets.slice(_lastLiveBetCount).forEach(g => {
      try {
        new Notification("⚾ 場中新推薦", {
          body: `${g.away_cn} @ ${g.home_cn}：${g.bet}`,
          icon: "icon.svg",
          tag: `${g.away_cn}-${g.home_cn}`,
        });
      } catch(e){}
    });
  }
  _lastLiveBetCount = bets.length;
}

/* ── Init theme on load ─────────────────────── */
(function(){
  if(localStorage.getItem("mlb_theme")==="light"){
    document.body.classList.add("light");
    const b = document.getElementById("theme-btn");
    if(b) b.textContent = "☀️";
  }
})();

loadData();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
