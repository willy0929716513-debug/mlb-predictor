<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>MLB 每日推薦</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="MLB推薦"/>
  <link rel="apple-touch-icon" href="icon.svg"/>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background:#0f172a; color:#e2e8f0; font-family:'Segoe UI',system-ui,sans-serif; }

    .card { background:#1e293b; border:1px solid #334155; }
    .tier-diamond { border-left:4px solid #a78bfa; }
    .tier-fire    { border-left:4px solid #f97316; }
    .tier-star    { border-left:4px solid #38bdf8; }

    .badge { display:inline-flex; align-items:center; padding:2px 9px; border-radius:9999px; font-size:0.70rem; font-weight:700; letter-spacing:.02em; }
    .badge-ml  { background:#1e3a8a; color:#93c5fd; }
    .badge-rl  { background:#4c1d95; color:#c4b5fd; }
    .badge-tot { background:#064e3b; color:#6ee7b7; }

    .stat-box { background:#0f172a; border-radius:0.5rem; padding:0.5rem 0.75rem; }
    .type-pill { background:#1e293b; border:1px solid #334155; border-radius:0.5rem; padding:0.4rem 0.6rem; }

    .sp-chip { display:inline-flex; align-items:center; gap:3px;
               background:#0f172a; border:1px solid #334155;
               border-radius:6px; padding:2px 7px; font-size:0.68rem; }
    .sp-warn { border-color:#f97316; color:#fb923c; }

    /* Filter tabs */
    .tab { padding:6px 16px; border-radius:8px; font-size:0.78rem; font-weight:600;
           cursor:pointer; transition:all .15s; border:1px solid transparent; }
    .tab-active { background:#38bdf8; color:#0f172a; }
    .tab-inactive { background:#1e293b; color:#94a3b8; border-color:#334155; }
    .tab-inactive:hover { background:#263548; color:#e2e8f0; }

    /* Pick card expand */
    .detail-section { overflow:hidden; transition:max-height .3s ease, opacity .3s ease; }
    .detail-section.collapsed { max-height:0; opacity:0; }
    .detail-section.expanded  { max-height:1000px; opacity:1; }

    /* Card fade-in */
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .pick-card { animation: fadeUp .25s ease both; }

    /* Copy toast */
    #copy-toast { transition: opacity .25s ease; }

    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation: spin .7s linear; }

    /* Token modal */
    #token-modal { backdrop-filter:blur(4px); }
    #history-panel { overflow:hidden; transition:max-height .35s ease, opacity .3s ease; }
    #history-panel.closed { max-height:0; opacity:0; }
    #history-panel.open   { max-height:2000px; opacity:1; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6">

<!-- Token modal -->
<div id="token-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/70"
     onclick="if(event.target===this)closeTokenModal()">
  <div class="bg-slate-800 border border-slate-600 rounded-2xl p-5 mx-4 w-full max-w-sm shadow-2xl">
    <h3 class="text-white font-bold text-base mb-1">🔑 輸入 GitHub Token</h3>
    <p class="text-slate-400 text-xs mb-3">
      需要有 <code class="bg-slate-700 px-1 rounded">workflow</code> 權限的 Personal Access Token（Fine-grained 或 Classic）。
      只會存在瀏覽器 localStorage，不會傳送到其他地方。
    </p>
    <input id="token-input" type="password" placeholder="ghp_xxxxxxxxxxxx"
           class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white
                  placeholder:text-slate-600 focus:outline-none focus:border-sky-500 mb-3"/>
    <div class="flex gap-2">
      <button onclick="saveToken()"
              class="flex-1 bg-sky-600 hover:bg-sky-500 text-white text-sm font-semibold py-2 rounded-lg transition-colors">
        儲存並執行
      </button>
      <button onclick="closeTokenModal()"
              class="px-4 bg-slate-700 hover:bg-slate-600 text-slate-300 text-sm rounded-lg transition-colors">
        取消
      </button>
    </div>
    <button onclick="clearToken()"
            class="mt-2 w-full text-xs text-slate-600 hover:text-rose-400 transition-colors text-center">
      清除已儲存的 Token
    </button>
  </div>
</div>

<!-- Run toast -->
<div id="run-toast"
     class="fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0
            text-sm font-semibold px-4 py-2 rounded-full shadow-xl transition-opacity duration-300">
</div>

<!-- Copy toast -->
<div id="copy-toast"
     class="fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0
            bg-emerald-600 text-white text-sm font-semibold px-4 py-2 rounded-full shadow-xl">
  ✓ 已複製到剪貼簿
</div>

<div class="max-w-2xl mx-auto">

  <!-- ── Header ───────────────────────────────── -->
  <div class="flex items-center justify-between mb-3">
    <div>
      <h1 class="text-xl font-bold text-white">⚾ MLB V2 每日推薦</h1>
      <p id="gen-time" class="text-xs text-slate-500 mt-0.5"></p>
    </div>
    <button onclick="manualRefresh()"
            class="w-9 h-9 flex items-center justify-center bg-slate-800 hover:bg-slate-700
                   border border-slate-600 rounded-full text-slate-300 text-base transition-colors">
      <span id="refresh-icon">↻</span>
    </button>
  </div>

  <!-- ── Action bar ────────────────────────────── -->
  <div class="grid grid-cols-2 gap-2 mb-5">
    <button onclick="triggerBot()" id="run-btn"
            class="flex items-center justify-center gap-2 py-2.5 rounded-xl
                   bg-emerald-700 hover:bg-emerald-600 active:bg-emerald-800
                   text-white text-sm font-bold transition-colors">
      <span id="run-btn-icon" class="text-base">▶</span> 立即執行
    </button>
    <button onclick="toggleHistory()"
            class="flex items-center justify-center gap-2 py-2.5 rounded-xl
                   bg-slate-700 hover:bg-slate-600 border border-slate-600
                   text-slate-300 text-sm font-semibold transition-colors">
      📋 <span id="hist-btn-label">歷史紀錄</span>
    </button>
  </div>

  <!-- ── 整體統計 ──────────────────────────────── -->
  <div class="card rounded-xl p-4 mb-4">
    <div class="grid grid-cols-3 gap-3 mb-3">
      <div class="stat-box text-center">
        <div class="text-xl font-bold text-white" id="s-wr">—</div>
        <div class="text-xs text-slate-500 mt-0.5">整體勝率</div>
      </div>
      <div class="stat-box text-center">
        <div class="text-xl font-bold" id="s-roi">—</div>
        <div class="text-xs text-slate-500 mt-0.5">ROI</div>
      </div>
      <div class="stat-box text-center">
        <div class="text-xl font-bold text-white" id="s-record">—</div>
        <div class="text-xs text-slate-500 mt-0.5">勝 / 場</div>
      </div>
    </div>
    <div class="grid grid-cols-3 gap-2" id="by-type-row"></div>
  </div>

  <!-- ── History panel ───────────────────────────── -->
  <div id="history-panel" class="closed">
    <div class="card rounded-xl p-4 mb-4">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-sm font-bold text-white">📋 最近 10 場紀錄</h2>
        <span id="hist-summary" class="text-xs text-slate-500"></span>
      </div>
      <div id="hist-list" class="space-y-2"></div>
    </div>
  </div>

  <!-- ── Filter tabs ───────────────────────────── -->
  <div class="flex gap-2 mb-4 flex-wrap" id="filter-tabs">
    <button class="tab tab-active" data-filter="ALL" onclick="setFilter('ALL',this)">全部 <span id="cnt-ALL" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive" data-filter="獨贏" onclick="setFilter('獨贏',this)">ML 獨贏 <span id="cnt-ML" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive" data-filter="讓分" onclick="setFilter('讓分',this)">RL 讓分 <span id="cnt-RL" class="ml-1 opacity-70"></span></button>
    <button class="tab tab-inactive" data-filter="大小分" onclick="setFilter('大小分',this)">TOT 大小分 <span id="cnt-TOT" class="ml-1 opacity-70"></span></button>
  </div>

  <!-- ── Live game section ─────────────────────── -->
  <div id="live-section"></div>

  <!-- ── Pick cards ────────────────────────────── -->
  <div id="picks-container">
    <div class="text-center text-slate-400 py-12">載入中…</div>
  </div>

  <p class="text-center text-xs text-slate-700 mt-6">
    Poisson · FIP+ERA混合 · K/9 · WHIP · 休息天數 · 球場PF · Devig · Kelly · 僅供參考
  </p>
</div>

<script>
const JSON_URL = "picks_latest.json";
let allPicks = [];
let currentFilter = "ALL";
let historyOpen = false;
let recentHistory = [];

/* ── Team key mapping ────────────────────────── */
const CN_TO_KEY = {
  "運動家":"athletics","太空人":"astros","藍鳥":"blue jays","勇士":"braves",
  "釀酒人":"brewers","紅雀":"cardinals","小熊":"cubs","響尾蛇":"diamondbacks",
  "道奇":"dodgers","巨人":"giants","守護者":"guardians","水手":"mariners",
  "馬林魚":"marlins","大都會":"mets","國民":"nationals","金鶯":"orioles",
  "教士":"padres","費城人":"phillies","海盜":"pirates","遊騎兵":"rangers",
  "光芒":"rays","紅襪":"red sox","紅人":"reds","落磯":"rockies",
  "皇家":"royals","老虎":"tigers","雙城":"twins","白襪":"white sox",
  "洋基":"yankees","天使":"angels",
};

/* ── Live game card renderer ─────────────────── */
function renderLiveSection(liveGames) {
  const el = document.getElementById("live-section");
  if (!el) return;
  if (!liveGames || liveGames.length === 0) {
    el.innerHTML = `<div class="text-xs text-slate-600 text-center py-1 mb-2">⚾ 目前沒有場中推薦</div>`;
    return;
  }
  const half = g => g.top_inning ? "▲" : "▼";
  const cards = liveGames.map(g => {
    const hasBet = !!g.bet;
    const projDiff = g.projected_total - g.market_total;
    const projCol = Math.abs(projDiff) < 1 ? "text-slate-400"
                  : projDiff < 0 ? "text-sky-400" : "text-orange-400";
    const betHtml = hasBet
      ? `<div class="mt-2 rounded-lg bg-emerald-900/40 border border-emerald-700/40 px-3 py-1.5">
           <span class="text-xs font-bold text-emerald-400">📡 ${g.bet}</span>
           <span class="text-xs text-slate-400 ml-2">${g.reason||""}</span>
         </div>`
      : "";
    return `
    <div class="card rounded-xl p-3 mb-3 border border-slate-700/50">
      <div class="flex items-center justify-between">
        <span class="text-sm font-bold text-white">${g.away_cn} @ ${g.home_cn}</span>
        <span class="text-xs bg-red-600 text-white px-2 py-0.5 rounded-full font-bold animate-pulse">
          ${half(g)}${g.inning}局 進行中
        </span>
      </div>
      <div class="mt-1.5 flex items-center gap-3">
        <span class="text-2xl font-bold text-white">${g.away_runs} : ${g.home_runs}</span>
        <span class="text-xs text-slate-500">盤口 ${g.market_total}</span>
        <span class="text-xs ${projCol}">預計終局 ${g.projected_total}</span>
      </div>
      ${betHtml}
    </div>`;
  }).join("");
  el.innerHTML = `
    <div class="mb-4">
      <div class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">⚾ 場中分析</div>
      ${cards}
    </div>`;
}

/* ── helpers ─────────────────────────────────── */
function tierClass(tier){
  if(tier.includes("💎")) return "tier-diamond";
  if(tier.includes("🔥")) return "tier-fire";
  return "tier-star";
}

function btypeKey(btype){
  if(btype==="獨贏") return "badge-ml";
  if(btype==="讓分") return "badge-rl";
  if(btype==="大小分") return "badge-tot";
  return "";
}

function btypeBadge(btype){
  const cls = btypeKey(btype);
  const label = btype==="獨贏"?"ML 獨贏":btype==="讓分"?"RL 讓分":btype==="大小分"?"TOT 大小分":btype;
  return `<span class="badge ${cls}">${label}</span>`;
}

function pnlColor(v){ return v==null?"text-slate-400":v>=0?"text-emerald-400":"text-rose-400"; }
function signStr(v,dec=1){ return (v>=0?"+":"")+v.toFixed(dec); }

/* ── Pitcher trend chip ──────────────────────── */
function trendChip(t){
  if(t==null) return "";
  if(t > 1.5) return `<span class="sp-chip text-rose-400">📈 ERA+${t.toFixed(1)} 惡化</span>`;
  if(t > 0.5) return `<span class="sp-chip text-amber-400">↑ ERA+${t.toFixed(1)}</span>`;
  if(t <-1.5) return `<span class="sp-chip text-emerald-400">📉 ERA${t.toFixed(1)} 改善</span>`;
  if(t <-0.5) return `<span class="sp-chip text-emerald-300">↓ ERA${t.toFixed(1)}</span>`;
  return "";
}

/* ── SP chip builder ─────────────────────────── */
function spChips(name, era, fip, k9, avgip, rest, whip){
  if(!name||name==="TBD") return '<span class="text-slate-600">TBD</span>';
  let chips = `<span class="font-medium text-slate-200">${name}</span>`;
  if(era!=null){
    const col = era<=3.5?"text-emerald-400":era>=4.8?"text-rose-400":"text-slate-300";
    let eraLabel = `ERA ${era.toFixed(2)}`;
    if(fip!=null && Math.abs(fip-era)>=0.50){
      const fipCol = fip<era?"text-emerald-300":"text-amber-300";
      eraLabel += ` <span class="${fipCol}">FIP ${fip.toFixed(2)}</span>`;
    }
    chips += ` <span class="sp-chip ${col}">${eraLabel}</span>`;
  }
  if(k9!=null && k9>=8.5)
    chips += ` <span class="sp-chip text-sky-400">K/9 ${k9.toFixed(1)}</span>`;
  if(avgip!=null){
    const warn = avgip<5.0;
    chips += ` <span class="sp-chip ${warn?'sp-warn':''}">${avgip.toFixed(1)} IP/G${warn?' ⚠️':''}</span>`;
  }
  if(whip!=null && whip>=1.30)
    chips += ` <span class="sp-chip text-amber-400">WHIP ${whip.toFixed(2)}</span>`;
  if(rest!=null){
    if(rest<=3)  chips += ` <span class="sp-chip sp-warn">短休 ${rest}d ⚠️</span>`;
    else if(rest>=9) chips += ` <span class="sp-chip sp-warn">長休 ${rest}d ⚠️</span>`;
  }
  return chips;
}

/* ── Probability rows ────────────────────────── */
function probBar(dvp, model_p, bp){
  const mkt = dvp!=null ? (dvp*100).toFixed(1) : null;
  const mdl = model_p!=null ? model_p.toFixed(1) : null;
  const be  = bp ? (100/bp).toFixed(1) : null;
  let rows = "";
  if(mkt) rows+=`<div class="flex justify-between text-xs"><span class="text-slate-500">真實市場概率</span><span class="text-slate-300">${mkt}%</span></div>`;
  if(mdl) rows+=`<div class="flex justify-between text-xs"><span class="text-slate-500">模型勝率</span><span class="font-semibold text-white">${mdl}%</span></div>`;
  if(be)  rows+=`<div class="flex justify-between text-xs"><span class="text-slate-500">盈虧平衡</span><span class="text-slate-400">${be}%</span></div>`;
  return rows;
}

/* ── Copy to clipboard ───────────────────────── */
function copyBet(text){
  navigator.clipboard.writeText(text).then(()=>{
    const t = document.getElementById("copy-toast");
    t.style.opacity="1";
    setTimeout(()=>{ t.style.opacity="0"; }, 1800);
  }).catch(()=>{
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand("copy"); document.body.removeChild(ta);
    const t = document.getElementById("copy-toast");
    t.style.opacity="1";
    setTimeout(()=>{ t.style.opacity="0"; }, 1800);
  });
}

/* ── Toggle detail section ───────────────────── */
function toggleDetail(id){
  const el = document.getElementById(id);
  const btn = document.getElementById("btn-"+id);
  if(!el) return;
  const isOpen = el.classList.contains("expanded");
  el.classList.toggle("collapsed", isOpen);
  el.classList.toggle("expanded", !isOpen);
  btn.textContent = isOpen ? "▼ 展開詳情" : "▲ 收合";
}

/* ── Pick card renderer ──────────────────────── */
let cardIdx = 0;
function renderCard(p){
  const uid    = "d"+(cardIdx++);
  const tc     = tierClass(p.tier);
  const badge  = btypeBadge(p.btype);
  const conf   = Math.round(p.conf||0);
  const edgeStr= signStr(p.edge||0)+"%";
  const confCol= conf>=80?"bg-emerald-500":conf>=70?"bg-amber-400":"bg-sky-400";
  const delay  = `animation-delay:${cardIdx*60}ms`;

  // Score / total
  let scoreHtml="";
  if(p.btype==="大小分"&&p.model_total!=null){
    const dir    = p.model_total>p.market_total?"偏OVER":p.model_total<p.market_total?"偏UNDER":"中性";
    const dirCol = p.model_total>p.market_total?"text-orange-400":p.model_total<p.market_total?"text-sky-400":"text-slate-400";
    scoreHtml=`<div class="flex justify-between items-center text-sm">
      <span class="text-slate-500">模型總分</span>
      <span><span class="font-bold text-white">${p.model_total}</span>
            <span class="text-slate-500 text-xs"> / 線 ${p.market_total}</span>
            <span class="ml-1 text-xs ${dirCol}">(${dir})</span></span>
    </div>`;
  } else {
    scoreHtml=`<div class="flex justify-between items-center text-sm">
      <span class="text-slate-500">預測得分</span>
      <span class="font-bold text-white">${p.away_cn} <span class="text-slate-400">${p.pred_away}</span> — <span class="text-slate-400">${p.pred_home}</span> ${p.home_cn}</span>
    </div>`;
  }

  // CLV
  const clvHtml = p.line_clv!=null
    ?`<span class="font-semibold ${p.line_clv>=0?"text-emerald-400":"text-rose-400"}">${signStr(p.line_clv)}% <span class="font-normal text-slate-500">${p.line_clv>=0?"市場認同↑":"市場反向↓"}</span></span>`
    :`<span class="text-slate-600">首次出現</span>`;

  const pfHtml = p.park_factor
    ?`<span class="text-xs text-amber-400 ml-1">🏟️ PF${p.park_factor.toFixed(2)}</span>`:"";

  const wxFactor = p.weather_factor;
  const wxHtml = wxFactor != null
    ? `<span class="text-xs ${wxFactor >= 1 ? 'text-sky-400' : 'text-slate-400'} ml-1">${wxFactor >= 1 ? '🌬️ +' : '🌧️ '}${Math.round((wxFactor-1)*100)}%</span>`
    : "";

  const umpAdj = p.ump_adj || 0;
  const umpHtml = (p.ump_name && Math.abs(umpAdj) >= 0.20)
    ? `<span class="text-xs text-violet-400 ml-1" title="${p.ump_name}">⚖️ ${umpAdj >= 0 ? '+' : ''}${umpAdj.toFixed(2)}</span>`
    : "";

  const awayRS = p.away_rs!=null
    ?`<span class="text-emerald-400">RS ${p.away_rs.toFixed(1)}</span>`
    :p.away_rpg!=null?`<span class="text-slate-500">隊均 ${p.away_rpg.toFixed(1)}</span>`:"—";
  const homeRS = p.home_rs!=null
    ?`<span class="text-emerald-400">RS ${p.home_rs.toFixed(1)}</span>`
    :p.home_rpg!=null?`<span class="text-slate-500">隊均 ${p.home_rpg.toFixed(1)}</span>`:"—";

  // Copy text
  const copyText = `${p.away_cn} @ ${p.home_cn} ｜ ${p.bet_label} @ ${p.bp?p.bp.toFixed(2):"?"} (${p.bk||"—"}) ｜ Kelly $${p.stake}`;

  return `
  <div class="card rounded-xl p-4 mb-4 ${tc} pick-card" style="${delay}" data-btype="${p.btype}">

    <!-- Header row -->
    <div class="flex items-start justify-between gap-2">
      <div class="min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-sm font-bold text-white">${p.tier}</span>
          ${badge} ${pfHtml}${wxHtml}${umpHtml}
        </div>
        <div class="text-lg font-bold text-white mt-0.5">${p.away_cn} @ ${p.home_cn}</div>
        <div class="text-xs text-slate-500">${p.game_date} &nbsp;${p.game_time} 台灣時間</div>
      </div>
      <div class="text-right shrink-0">
        <div class="text-2xl font-bold text-emerald-400">$${p.stake}</div>
        <div class="text-xs text-slate-500">建議下注</div>
        <div class="text-xs text-slate-400 mt-0.5">@ ${p.bp?p.bp.toFixed(2):"—"}</div>
      </div>
    </div>

    <!-- Bet label + copy button -->
    <div class="mt-3 bg-slate-800/60 rounded-lg px-3 py-2 flex items-center justify-between gap-2">
      <span class="text-sm font-semibold text-white">${p.bet_label}</span>
      <div class="flex items-center gap-2 shrink-0">
        <span class="text-xs text-slate-500">${p.bk||""}</span>
        <button onclick="copyBet(${JSON.stringify(copyText)})"
                class="text-xs bg-slate-700 hover:bg-slate-600 active:bg-slate-500 px-2.5 py-1 rounded-md
                       text-slate-300 transition-colors flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
          複製
        </button>
      </div>
    </div>

    <!-- Quick stats row (always visible) -->
    <div class="mt-3 grid grid-cols-3 gap-2 text-center">
      <div class="bg-slate-800/40 rounded-lg py-2">
        <div class="text-xs text-slate-500">Edge</div>
        <div class="text-sm font-bold ${(p.edge||0)>=12?"text-emerald-400":(p.edge||0)>=8?"text-amber-400":"text-sky-400"}">${edgeStr}</div>
      </div>
      <div class="bg-slate-800/40 rounded-lg py-2">
        <div class="text-xs text-slate-500">信心</div>
        <div class="text-sm font-bold text-white">${conf}%</div>
      </div>
      <div class="bg-slate-800/40 rounded-lg py-2">
        <div class="text-xs text-slate-500">線路 CLV</div>
        <div class="text-sm">${clvHtml}</div>
      </div>
    </div>

    <!-- Confidence bar -->
    <div class="mt-2 h-1.5 bg-slate-700 rounded-full overflow-hidden">
      <div class="h-full rounded-full ${confCol} transition-all duration-700" style="width:${Math.min(conf,100)}%"></div>
    </div>

    <!-- Expand button -->
    <button id="btn-${uid}" onclick="toggleDetail('${uid}')"
            class="mt-3 w-full text-xs text-slate-500 hover:text-slate-300 bg-slate-800/40 hover:bg-slate-800/70
                   rounded-lg py-1.5 transition-colors">
      ▼ 展開詳情
    </button>

    <!-- Collapsible details -->
    <div id="${uid}" class="detail-section collapsed">
      <div class="mt-3 space-y-1.5">
        <div class="text-xs text-slate-500 font-medium">先發投手</div>
        <div class="text-xs leading-relaxed">
          <span class="text-slate-500 mr-1">客隊</span>
          ${spChips(p.away_sp,p.away_era,p.away_fip,p.away_k9,p.away_avgip,p.away_rest,p.away_whip)}
          ${trendChip(p.away_trend)}
        </div>
        <div class="text-xs leading-relaxed">
          <span class="text-slate-500 mr-1">主隊</span>
          ${spChips(p.home_sp,p.home_era,p.home_fip,p.home_k9,p.home_avgip,p.home_rest,p.home_whip)}
          ${trendChip(p.home_trend)}
        </div>
        <div class="grid grid-cols-2 gap-1 text-xs text-slate-500 mt-1">
          <div>得分支援: ${awayRS}</div>
          <div>得分支援: ${homeRS}</div>
        </div>
      </div>
      <div class="mt-3 bg-slate-800/40 rounded-lg px-3 py-2">${scoreHtml}</div>
      <div class="mt-2 bg-slate-800/40 rounded-lg px-3 py-2 space-y-1">
        ${probBar(p.dv_p,p.model_p,p.bp)}
      </div>
    </div>

  </div>`;
}

/* ── Type pill renderer ──────────────────────── */
function renderTypePill(label, data){
  if(!data) return `<div class="type-pill text-center">
    <div class="text-xs font-bold text-slate-400">${label}</div>
    <div class="text-xs text-slate-600 mt-0.5">資料不足</div>
  </div>`;
  const wrCol  = data.win_rate>=55?"text-emerald-400":data.win_rate>=50?"text-amber-400":"text-rose-400";
  const roiCol = data.roi!=null?(data.roi>=0?"text-emerald-400":"text-rose-400"):"text-slate-500";
  return `<div class="type-pill text-center">
    <div class="text-xs font-bold text-slate-300 mb-1">${label}</div>
    <div class="text-sm font-bold ${wrCol}">${data.win_rate.toFixed(1)}%</div>
    <div class="text-xs text-slate-500">${data.wins}/${data.settled}</div>
    <div class="text-xs font-semibold ${roiCol} mt-0.5">ROI ${data.roi!=null?signStr(data.roi)+"%":"N/A"}</div>
  </div>`;
}

/* ── Filter ──────────────────────────────────── */
function setFilter(type, btn){
  currentFilter = type;
  document.querySelectorAll(".tab").forEach(t=>{
    t.classList.toggle("tab-active", t===btn);
    t.classList.toggle("tab-inactive", t!==btn);
  });
  renderPicks();
}

function renderPicks(){
  cardIdx = 0;
  const container = document.getElementById("picks-container");
  const filtered = currentFilter==="ALL"
    ? allPicks
    : allPicks.filter(p=>p.btype===currentFilter);

  if(filtered.length===0){
    container.innerHTML=`<div class="card rounded-xl p-8 text-center text-slate-400">
      ${allPicks.length===0?"今日無符合條件之推薦":"此類別目前無推薦"}
    </div>`;
    return;
  }
  container.innerHTML = filtered.map(renderCard).join("");
}

/* ── Run bot ─────────────────────────────────── */
const GH_OWNER    = "willy0929716513-debug";
const GH_REPO     = "mlb-predictor";
const GH_WORKFLOW = "mlb_bot.yml";
const GH_BRANCH   = "main";

function showRunToast(msg, ok){
  const t = document.getElementById("run-toast");
  t.textContent = msg;
  t.className = "fixed top-5 left-1/2 -translate-x-1/2 z-50 pointer-events-none opacity-0 text-sm font-semibold px-4 py-2 rounded-full shadow-xl transition-opacity duration-300 "
    + (ok ? "bg-emerald-600 text-white" : "bg-rose-600 text-white");
  t.style.opacity = "1";
  setTimeout(()=>{ t.style.opacity="0"; }, 3000);
}

function openTokenModal(){
  const m = document.getElementById("token-modal");
  m.classList.remove("hidden");
  m.classList.add("flex");
  const saved = localStorage.getItem("gh_pat");
  document.getElementById("token-input").value = saved || "";
  setTimeout(()=>document.getElementById("token-input").focus(), 50);
}
function closeTokenModal(){
  const m = document.getElementById("token-modal");
  m.classList.add("hidden");
  m.classList.remove("flex");
}
function saveToken(){
  const v = document.getElementById("token-input").value.trim();
  if(!v){ showRunToast("請輸入 Token", false); return; }
  localStorage.setItem("gh_pat", v);
  closeTokenModal();
  dispatchWorkflow(v);
}
function clearToken(){
  localStorage.removeItem("gh_pat");
  document.getElementById("token-input").value = "";
  showRunToast("Token 已清除", true);
}

async function dispatchWorkflow(token){
  const btn  = document.getElementById("run-btn");
  const icon = document.getElementById("run-btn-icon");
  btn.disabled = true;
  icon.textContent = "…";

  try {
    const res = await fetch(
      `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/actions/workflows/${GH_WORKFLOW}/dispatches`,
      {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${token}`,
          "Accept": "application/vnd.github+json",
          "X-GitHub-Api-Version": "2022-11-28",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ ref: GH_BRANCH }),
      }
    );
    if(res.status === 204){
      showRunToast("✓ 已觸發！約 30 秒後更新", true);
      icon.textContent = "✓";
      setTimeout(()=>{ icon.textContent="▶"; btn.disabled=false; }, 5000);
    } else {
      const err = await res.json().catch(()=>({}));
      if(res.status===401||res.status===403){
        showRunToast("Token 無效或無 workflow 權限", false);
        openTokenModal();
      } else {
        showRunToast(`失敗 (${res.status}): ${err.message||""}`, false);
      }
      icon.textContent = "▶"; btn.disabled = false;
    }
  } catch(e){
    showRunToast("網路錯誤："+e.message, false);
    icon.textContent = "▶"; btn.disabled = false;
  }
}

function triggerBot(){
  const token = localStorage.getItem("gh_pat");
  if(token) dispatchWorkflow(token);
  else openTokenModal();
}

/* ── History ─────────────────────────────────── */
function toggleHistory(){
  historyOpen = !historyOpen;
  const panel = document.getElementById("history-panel");
  const lbl   = document.getElementById("hist-btn-label");
  panel.classList.toggle("open", historyOpen);
  panel.classList.toggle("closed", !historyOpen);
  lbl.textContent = historyOpen ? "收合紀錄" : "歷史紀錄";
  if(historyOpen) renderHistory();
}

function renderHistory(){
  const list = document.getElementById("hist-list");
  const summary = document.getElementById("hist-summary");
  if(!recentHistory.length){
    list.innerHTML='<div class="text-slate-500 text-sm text-center py-3">尚無歷史紀錄</div>';
    return;
  }
  const settled = recentHistory.filter(r=>r.result==="W"||r.result==="L");
  const wins    = settled.filter(r=>r.result==="W").length;
  summary.textContent = settled.length ? `${wins}勝${settled.length-wins}負 / 最近${recentHistory.length}場` : "";

  list.innerHTML = recentHistory.map(r=>{
    const resultHtml = r.result==="W"
      ? '<span class="text-xs font-bold text-emerald-400 bg-emerald-900/40 px-2 py-0.5 rounded-full">✓ 贏</span>'
      : r.result==="L"
      ? '<span class="text-xs font-bold text-rose-400 bg-rose-900/40 px-2 py-0.5 rounded-full">✗ 輸</span>'
      : r.result==="P"
      ? '<span class="text-xs font-bold text-slate-400 bg-slate-700 px-2 py-0.5 rounded-full">— 平</span>'
      : '<span class="text-xs text-amber-400 bg-amber-900/30 px-2 py-0.5 rounded-full">待結算</span>';

    const btBadge = r.bet_type==="獨贏"
      ? '<span class="badge badge-ml">ML</span>'
      : r.bet_type==="讓分"
      ? '<span class="badge badge-rl">RL</span>'
      : '<span class="badge badge-tot">TOT</span>';

    const pnl = r.result==="W" && r.stake && r.price
      ? `<span class="text-emerald-400 text-xs">+$${(r.stake*(r.price-1)).toFixed(1)}</span>`
      : r.result==="L" && r.stake
      ? `<span class="text-rose-400 text-xs">-$${r.stake}</span>`
      : r.stake ? `<span class="text-slate-500 text-xs">$${r.stake}</span>` : "";

    return `
    <div class="flex items-center gap-2 bg-slate-800/50 rounded-lg px-3 py-2">
      <div class="shrink-0">${resultHtml}</div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-1.5 flex-wrap">
          ${btBadge}
          <span class="text-xs font-medium text-white truncate">${r.away_cn} @ ${r.home_cn}</span>
        </div>
        <div class="text-xs text-slate-500 mt-0.5">${r.date} · ${r.label||r.bet_type} · @${r.price||"—"} · Edge ${signStr(r.edge||0)}%</div>
      </div>
      <div class="text-right shrink-0">${pnl}</div>
    </div>`;
  }).join("");
}

/* ── Update counts on tabs ───────────────────── */
function updateCounts(){
  const cnts = { ALL: allPicks.length, ML: 0, RL: 0, TOT: 0 };
  allPicks.forEach(p=>{
    if(p.btype==="獨贏") cnts.ML++;
    else if(p.btype==="讓分") cnts.RL++;
    else if(p.btype==="大小分") cnts.TOT++;
  });
  const fmt = n => n>0 ? `(${n})` : "";
  document.getElementById("cnt-ALL").textContent = fmt(cnts.ALL);
  document.getElementById("cnt-ML").textContent  = fmt(cnts.ML);
  document.getElementById("cnt-RL").textContent  = fmt(cnts.RL);
  document.getElementById("cnt-TOT").textContent = fmt(cnts.TOT);
}

/* ── Main loader ─────────────────────────────── */
async function loadData(){
  const container = document.getElementById("picks-container");
  const icon = document.getElementById("refresh-icon");
  icon.classList.add("spin");
  setTimeout(()=>icon.classList.remove("spin"), 700);

  try {
    const res = await fetch(JSON_URL+"?t="+Date.now());
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();

    document.getElementById("gen-time").textContent = "更新於 "+data.generated_at;

    const s = data.stats||{};
    const wrEl  = document.getElementById("s-wr");
    const roiEl = document.getElementById("s-roi");
    const recEl = document.getElementById("s-record");
    wrEl.textContent  = (s.win_rate||0).toFixed(1)+"%";
    roiEl.textContent = s.roi!=null?signStr(s.roi)+"%":"N/A";
    roiEl.className   = "text-xl font-bold "+(s.roi!=null?(s.roi>=0?"text-emerald-400":"text-rose-400"):"text-slate-400");
    recEl.textContent = (s.wins||0)+" / "+(s.settled||0);

    const bt = s.by_type||{};
    document.getElementById("by-type-row").innerHTML =
      renderTypePill("ML 獨贏",bt["ML"]||null)+
      renderTypePill("RL 讓分",bt["RL"]||null)+
      renderTypePill("TOT 大小分",bt["TOT"]||null);

    allPicks = data.picks||[];
    recentHistory = data.recent_history||[];
    updateCounts();
    renderPicks();
    renderLiveSection(data.live_games);
    if(historyOpen) renderHistory();
    // 有場中比賽時每 90 秒自動刷新
    if (data.live_games && data.live_games.length > 0) {
      setTimeout(() => location.reload(), 90000);
    }
  } catch(e){
    container.innerHTML=`<div class="card rounded-xl p-8 text-center text-rose-400">載入失敗：${e.message}</div>`;
  }
}

function manualRefresh(){ loadData(); }

loadData();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
</script>
